name: Update PAPANATO Dashboard

on:
  schedule:
    - cron: '0 7 * * 1'   # Todos los lunes a las 7am UTC (9am España)
  workflow_dispatch:        # También permite correrlo manualmente

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run dashboard updater
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: python update_dashboard.py

      - name: Commit and push updated dashboard
        run: |
          git config user.name "PAPANATO Bot"
          git config user.email "bot@papanato.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Dashboard actualizado: $(date +%Y-%m-%d)"
          git push
